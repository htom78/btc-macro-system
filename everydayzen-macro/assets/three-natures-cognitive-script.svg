<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2600" viewBox="0 0 1600 2600" role="img" aria-labelledby="title desc">
  <title id="title">三自性认知地图</title>
  <desc id="desc">依他起、遍计所执、圆成实三层观察法的结构图</desc>
  <defs>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#181816" stroke-opacity=".06" stroke-width="2"/>
    </pattern>
    <pattern id="grain" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M2 2h1v1H2zM11 5h1v1h-1zM6 14h1v1H6zM16 12h1v1h-1z" fill="#181816" opacity=".08"/>
    </pattern>
    <linearGradient id="paper" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f1e4"/>
      <stop offset=".55" stop-color="#efe6d4"/>
      <stop offset="1" stop-color="#f9f5eb"/>
    </linearGradient>
    <style>
      .serif { font-family: "Iowan Old Style", "Songti SC", "Noto Serif CJK SC", Georgia, serif; }
      .sans { font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", sans-serif; }
      .mono { font-family: "SFMono-Regular", Menlo, monospace; }
    </style>
  </defs>

  <rect width="1600" height="2600" fill="url(#paper)"/>
  <rect width="1600" height="2600" fill="url(#grid)"/>
  <rect width="1600" height="2600" fill="url(#grain)"/>

  <path d="M-120 380 C260 180 445 420 738 270 C1000 135 1210 76 1720 170" fill="none" stroke="#b48635" stroke-opacity=".46" stroke-width="34"/>
  <path d="M-40 2290 C245 2100 495 2220 720 2070 C1010 1878 1250 1910 1660 1720" fill="none" stroke="#2c638a" stroke-opacity=".24" stroke-width="42"/>
  <path d="M1238 0 L1600 0 L1600 2600 L1410 2600 Z" fill="#181816" opacity=".055"/>

  <g transform="translate(120 118)">
    <text class="mono" x="0" y="0" fill="#b94b45" font-size="34" font-weight="800">EVERYDAYZEN SCRIPT MAP</text>
    <text class="serif" x="0" y="140" fill="#181816" font-size="142" font-weight="800">三自性</text>
    <text class="serif" x="0" y="270" fill="#181816" font-size="96" font-weight="800">把现实、故事和真实分开</text>
    <text class="sans" x="0" y="360" fill="#4b4740" font-size="40" font-weight="650">不是否定现实，而是在同一个经验里看见心加上的执著。</text>
  </g>

  <g transform="translate(120 590)">
    <rect x="0" y="0" width="1360" height="420" rx="26" fill="#fffdf7" fill-opacity=".78" stroke="#181816" stroke-opacity=".16" stroke-width="3"/>
    <text class="mono" x="52" y="76" fill="#b48635" font-size="28" font-weight="800">01 / PARATANTRA</text>
    <text class="serif" x="52" y="172" fill="#181816" font-size="86" font-weight="800">依他起</text>
    <text class="sans" x="52" y="248" fill="#2f2c28" font-size="38" font-weight="700">经验依条件生起</text>
    <text class="sans" x="52" y="318" fill="#625b52" font-size="32">事件、身体、情绪、关系与习气共同形成当下。</text>
    <path d="M930 86 C1040 110 1088 178 1122 254 C1160 338 1248 350 1308 285" fill="none" stroke="#b48635" stroke-width="16" stroke-linecap="round"/>
    <circle cx="926" cy="86" r="24" fill="#b48635"/>
    <circle cx="1122" cy="254" r="24" fill="#4d7b59"/>
    <circle cx="1308" cy="285" r="24" fill="#2c638a"/>
  </g>

  <g transform="translate(120 1088)">
    <rect x="0" y="0" width="1360" height="420" rx="26" fill="#181816" fill-opacity=".94" stroke="#181816" stroke-opacity=".25" stroke-width="3"/>
    <text class="mono" x="52" y="76" fill="#e9c77a" font-size="28" font-weight="800">02 / PARIKALPITA</text>
    <text class="serif" x="52" y="172" fill="#fffdf7" font-size="86" font-weight="800">遍计所执</text>
    <text class="sans" x="52" y="248" fill="#fff7e6" font-size="38" font-weight="700">心把解释抓成真实</text>
    <text class="sans" x="52" y="318" fill="#c8c0b3" font-size="32">在经验上加名、加我、加对象、加故事。</text>
    <g transform="translate(944 82)">
      <rect x="0" y="0" width="318" height="238" rx="22" fill="#fffdf7" fill-opacity=".10" stroke="#fffdf7" stroke-opacity=".28"/>
      <text class="serif" x="32" y="76" fill="#fffdf7" font-size="42" font-weight="800">“他否定我”</text>
      <path d="M38 125 H278 M38 168 H230" stroke="#fffdf7" stroke-opacity=".45" stroke-width="12" stroke-linecap="round"/>
    </g>
  </g>

  <g transform="translate(120 1586)">
    <rect x="0" y="0" width="1360" height="420" rx="26" fill="#fffdf7" fill-opacity=".82" stroke="#181816" stroke-opacity=".16" stroke-width="3"/>
    <text class="mono" x="52" y="76" fill="#2c638a" font-size="28" font-weight="800">03 / PARINISPANNA</text>
    <text class="serif" x="52" y="172" fill="#181816" font-size="86" font-weight="800">圆成实</text>
    <text class="sans" x="52" y="248" fill="#2f2c28" font-size="38" font-weight="700">在经验中看见执著不成立</text>
    <text class="sans" x="52" y="318" fill="#625b52" font-size="32">事情还在，情绪还在；那个绝对化的故事松开了。</text>
    <g transform="translate(990 84)">
      <circle cx="128" cy="128" r="118" fill="none" stroke="#2c638a" stroke-opacity=".42" stroke-width="18"/>
      <path d="M56 130 L108 182 L208 78" fill="none" stroke="#4d7b59" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <g transform="translate(120 2100)">
    <rect x="0" y="0" width="1360" height="276" rx="26" fill="#fffdf7" fill-opacity=".72" stroke="#181816" stroke-opacity=".16" stroke-width="3"/>
    <text class="mono" x="52" y="72" fill="#b94b45" font-size="28" font-weight="800">PRACTICE</text>
    <text class="serif" x="52" y="142" fill="#181816" font-size="56" font-weight="800">三问进入现场</text>
    <text class="sans" x="52" y="214" fill="#3f3b36" font-size="34">实际发生了什么？我加了什么故事？如果故事不是绝对真实，我现在怎样行动？</text>
  </g>

  <g transform="translate(120 2460)">
    <line x1="0" y1="0" x2="1360" y2="0" stroke="#181816" stroke-opacity=".18" stroke-width="3"/>
    <text class="mono" x="0" y="62" fill="#68625a" font-size="26" font-weight="700">依他起：水在动 / 遍计所执：心把影子当真 / 圆成实：看见水还是水，影子只是影子</text>
  </g>
</svg>
