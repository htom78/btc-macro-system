name: Update BTC Macro Report

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC. This is 08:10 in Asia/Tokyo.
    - cron: "10 23 * * *"
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: btc-macro-report
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report and Dao state
        if: github.event_name != 'push'
        run: |
          python3 btc-macro-system/run.py --force
          python3 dao-system/scripts/build_dao.py

      - name: Validate investment thesis harness
        run: python3 investment-thesis-harness/scripts/validate.py

      - name: Generate investment thesis harness
        run: python3 investment-thesis-harness/run.py

      - name: Generate major futures system
        run: python3 major-futures-system/scripts/update_major_futures.py

      - name: Update MSTR mNAV daily snapshot
        if: github.event_name != 'push'
        run: python3 mstr-mnav/scripts/update_mstr_data.py

      - name: Commit updated history
        if: github.event_name != 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add btc-macro-system/outputs/report.html btc-macro-system/outputs/latest.json
          git add dao-system/data/dao-latest.json
          git add -f btc-macro-system/data/history/observations.jsonl
          git add investment-thesis-harness/outputs/report.html investment-thesis-harness/outputs/latest.json
          git add -f investment-thesis-harness/data/history/thesis_snapshots.jsonl
          git add major-futures-system/data/latest.json
          git add mstr-mnav/data/mstr-latest.json mstr-mnav/data/mstr-history.jsonl
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "Update research reports"
            git push
          fi

      - name: Prepare Pages artifact
        run: bash tools/build_pages_site.sh _site

      - name: Validate Pages links
        run: python3 tools/check_site_links.py --root _site

      - name: Validate agent harness
        run: python3 agent-harness/scripts/validate.py --site-root _site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
